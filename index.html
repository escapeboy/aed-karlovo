<style>
  :root{
    --aed:#008a3e; --aed-d:#006e31;
    --ink:#14201a; --muted:#5b6b62;
    --surface:#fff; --bg:#f3f6f3; --line:#e3e8e4;
    --emergency:#d6201f; --emergency-d:#b01716;
    --focus:#1a73e8;
    --r:12px; --shadow:0 1px 3px rgba(20,32,26,.12),0 6px 16px rgba(20,32,26,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    color:var(--ink); background:var(--bg);
    -webkit-text-size-adjust:100%;
    display:flex; flex-direction:column; min-height:100dvh;
  }
  a{color:inherit}

  /* Emergency bar — the one place red is allowed */
  .er{
    display:flex; align-items:center; gap:10px;
    background:var(--emergency); color:#fff;
    padding:max(10px,env(safe-area-inset-top)) max(14px,env(safe-area-inset-right)) 10px max(14px,env(safe-area-inset-left));
    text-decoration:none; font-weight:700; letter-spacing:.2px;
  }
  .er:hover{background:var(--emergency-d)}
  .er svg{flex:0 0 auto}
  .er b{font-size:1.05rem}
  .er span{font-weight:500; opacity:.92; font-size:.85rem}
  .er .arrow{margin-left:auto; font-size:1.1rem}

  header{
    padding:12px 14px 10px; background:var(--surface); border-bottom:1px solid var(--line);
    display:flex; align-items:flex-start; gap:10px;
  }
  header .h-text{flex:1; min-width:0}
  header h1{margin:0; font-size:1.05rem; line-height:1.25; font-weight:700}
  header p{margin:2px 0 0; color:var(--muted); font-size:.82rem}
  .help-link{display:inline-flex; align-items:center; gap:6px; margin-top:6px; font-size:.82rem; font-weight:700; color:var(--aed-d); text-decoration:none}
  .help-link:hover{text-decoration:underline}
  .help-link svg{flex:0 0 auto}

  /* Mobile (base): map on top, list below */
  .layout{flex:1; display:flex; flex-direction:column; min-height:0}
  #map{flex:0 0 46dvh; min-height:240px; background:#dfe6e0}
  .panel{
    flex:1 1 auto; width:100%; background:var(--surface); border-top:1px solid var(--line);
    display:flex; flex-direction:column; min-height:0;
  }
  .panel-head{padding:10px 14px; display:flex; gap:8px; align-items:center; border-bottom:1px solid var(--line)}
  .near{
    flex:1; appearance:none; border:1px solid var(--aed); background:var(--aed); color:#fff;
    font:inherit; font-weight:600; padding:10px 12px; border-radius:var(--r); cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
  }
  .near:hover{background:var(--aed-d); border-color:var(--aed-d)}
  .near:disabled{opacity:.6; cursor:progress}
  .count{color:var(--muted); font-size:.8rem; white-space:nowrap}

  ul.list{list-style:none; margin:0; padding:8px; overflow:auto; -webkit-overflow-scrolling:touch}
  li.card{
    border:1px solid var(--line); border-radius:var(--r); padding:12px; margin:6px 2px;
    background:var(--surface); box-shadow:var(--shadow);
  }
  li.card.active{border-color:var(--aed); box-shadow:0 0 0 2px rgba(0,138,62,.18),var(--shadow)}
  .card-top{display:flex; gap:10px; align-items:flex-start}
  .pin{flex:0 0 auto; margin-top:1px}
  .card h2{margin:0; font-size:.98rem; font-weight:700; line-height:1.2}
  .card .city{color:var(--muted); font-weight:500}
  .card .meta{margin:3px 0 0; color:var(--muted); font-size:.84rem; line-height:1.35}
  .card .dist{margin-left:auto; flex:0 0 auto; font-size:.8rem; font-weight:600; color:var(--aed-d); white-space:nowrap}
  .card .todo{color:#9a6a00}
  .actions{display:flex; gap:8px; margin-top:10px}
  .btn{
    flex:1; appearance:none; text-decoration:none; text-align:center; font:inherit; font-weight:600;
    padding:10px; border-radius:10px; cursor:pointer; border:1px solid var(--line); background:var(--bg); color:var(--ink);
  }
  .btn.primary{background:var(--aed); border-color:var(--aed); color:#fff}
  .btn.primary:hover{background:var(--aed-d)}
  .btn:hover{background:#eef2ef}

  :focus-visible{outline:3px solid var(--focus); outline-offset:2px; border-radius:6px}

  /* Custom AED marker */
  .aed-mark{display:grid; place-items:center}
  .aed-mark svg{filter:drop-shadow(0 2px 3px rgba(0,0,0,.35))}

  .leaflet-popup-content{margin:12px 14px; font:inherit}
  .leaflet-popup-content h2{margin:0 0 4px; font-size:.98rem}
  .leaflet-popup-content .meta{color:var(--muted); font-size:.84rem; margin:2px 0}
  .leaflet-popup-content a.nav{
    display:inline-block; margin-top:8px; background:var(--aed); color:#fff;
    text-decoration:none; padding:8px 12px; border-radius:10px; font-weight:600;
  }

  /* Desktop: map + sidebar */
  @media (min-width:880px){
    .layout{flex-direction:row}
    #map{order:1; flex:1 1 auto; min-height:0}
    .panel{order:2; flex:0 0 380px; width:380px; border-top:0; border-left:1px solid var(--line)}
  }
  /* Native-feeling touch feedback */
  .er,.near,.btn,.card,#installBtn{-webkit-tap-highlight-color:transparent}
  .near,.btn{transition:background .15s ease,border-color .15s ease,transform .08s ease}
  .er{transition:background .15s ease}
  .card{transition:box-shadow .2s ease,border-color .2s ease,transform .09s ease}
  .near:active,.btn:active{transform:scale(.96)}
  .card:active{transform:scale(.99)}
  .er:active{background:var(--emergency-d)}

  /* Cards animate in once, lightly staggered (delay set inline by index) */
  @keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  li.card{animation:cardIn .26s cubic-bezier(.22,.61,.36,1) both}

  /* Splash screen — white heart on brand green, matches the OS splash */
  #splash{
    position:fixed; inset:0; z-index:9999;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
    background:var(--aed); color:#fff;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    transition:opacity .45s ease; will-change:opacity;
  }
  #splash.hide{opacity:0; pointer-events:none}
  #splash svg{filter:drop-shadow(0 6px 14px rgba(0,0,0,.25)); animation:beat 1.6s ease-in-out infinite}
  #splash .sp-name{font-weight:700; font-size:1.05rem; letter-spacing:.2px}
  #splash .sp-sub{font-size:.82rem; opacity:.85; margin-top:-8px}
  @keyframes beat{0%,100%{transform:scale(1)}18%{transform:scale(1.12)}36%{transform:scale(1)}54%{transform:scale(1.08)}}

  /* Install affordance */
  #installBtn{
    display:none; appearance:none; border:1px solid var(--aed); background:var(--aed); color:#fff;
    font:inherit; font-weight:600; font-size:.78rem; padding:7px 12px; border-radius:999px; cursor:pointer;
    white-space:nowrap; flex:0 0 auto; align-self:center; gap:6px; align-items:center;
  }
  #installBtn:hover{background:var(--aed-d); border-color:var(--aed-d)}
  #iosHint{
    display:none; background:#fff; color:var(--ink); border-bottom:1px solid var(--line);
    font-size:.84rem; padding:9px 14px; gap:8px; align-items:center; line-height:1.3;
  }
  #iosHint b{color:var(--aed-d)}
  #iosHint button{
    margin-left:auto; appearance:none; border:0; background:transparent; color:var(--muted);
    font:inherit; font-size:1.1rem; line-height:1; cursor:pointer; padding:2px 6px;
  }

  @media (prefers-reduced-motion:reduce){
    *{scroll-behavior:auto !important}
    li.card{animation:none}
    #splash svg{animation:none}
    .near,.btn,.card,.er{transition:none}
    .near:active,.btn:active,.card:active{transform:none}
  }
</style>

  // Splash: hide on first paint of data, with a hard safety timeout so it never sticks
  window.__hideSplash = function(){
    var s = document.getElementById("splash");
    if(!s || s.classList.contains("hide")) return;
    s.classList.add("hide");
    setTimeout(function(){ if(s.parentNode) s.parentNode.removeChild(s); }, 500);
  };
  setTimeout(window.__hideSplash, 2600);
</script>

    else meta += '<br><span class="todo">Точното място в обекта — да се уточни</span>';
    return ''
      +'<div class="card-top">'
      +'  <span class="pin"><svg width="18" height="22" viewBox="0 0 34 42"><path d="M17 1C8.7 1 2 7.6 2 15.7 2 26 17 41 17 41s15-15 15-25.3C32 7.6 25.3 1 17 1z" fill="#008a3e"/><path d="M17 25.5l-5.6-5.3c-1.9-1.8-1.9-4.7 0-6.5 1.7-1.6 4.4-1.4 6 .3 1.6-1.7 4.3-1.9 6-.3 1.9 1.8 1.9 4.7 0 6.5L17 25.5z" fill="#fff"/></svg></span>'
      +'  <div style="flex:1;min-width:0"><h2>'+esc(p.name)+' <span class="city">· '+esc(p.city)+'</span></h2>'
      +'  <div class="meta">'+meta+'</div></div>'
      +'  <span class="dist" data-dist></span>'
      +'</div>'
      +'<div class="actions">'
      +'  <a class="btn primary" target="_blank" rel="noopener" href="'+navUrl(p.lat,p.lng)+'">Навигирай</a>'
      +'  <button class="btn" type="button" data-focus>Покажи на картата</button>'
      +'</div>';
  }

  function focusPoint(p){
    points.forEach(function(q){ q.li.classList.toggle("active", q===p); });
    var mobile = window.matchMedia("(max-width:879px)").matches;
    // On phones the map sits above the list — bring it into view first
    if(mobile){
      document.getElementById("map").scrollIntoView({behavior:"smooth", block:"start"});
    }
    // Center the marker, nudged just below centre so its popup (opens upward) stays
    // fully visible without Leaflet shoving the marker to the bottom edge.
    var z = 17, offsetY = mobile ? 45 : 30;
    var pt = map.project([p.lat,p.lng], z).subtract([0, offsetY]);
    map.setView(map.unproject(pt, z), z, {animate:true});
    p.marker.openPopup();
    p.li.scrollIntoView({block:"nearest"});
  }

  function render(){
    listEl.innerHTML = "";
    points.forEach(function(p, i){
      var li = document.createElement("li");
      li.className = "card";
      li.style.animationDelay = Math.min(i*30, 300) + "ms";
      li.innerHTML = cardHtml(p);
      li.querySelector("[data-focus]").addEventListener("click", function(){ focusPoint(p); });
      p.li = li;
      p.distEl = li.querySelector("[data-dist]");
      listEl.appendChild(li);
    });
    countEl.textContent = points.length + " точки";
    if(userPos) applyDistances();
  }

  function applyDistances(){
    points.forEach(function(p){
      p.dist = haversine(userPos[0],userPos[1],p.lat,p.lng);
      p.distEl.textContent = fmtDist(p.dist);
    });
    points.sort(function(a,b){ return a.dist-b.dist; });
    points.forEach(function(p){ listEl.appendChild(p.li); });
  }

  nearBtn.addEventListener("click", function(){
    if(!navigator.geolocation){ alert("Браузърът не поддържа геолокация."); return; }
    nearBtn.disabled = true; nearBtn.textContent = "Локализиране…";
    navigator.geolocation.getCurrentPosition(function(pos){
      userPos = [pos.coords.latitude, pos.coords.longitude];
      L.circleMarker(userPos,{radius:7,color:"#1a73e8",weight:3,fillColor:"#1a73e8",fillOpacity:.5})
        .addTo(map).bindPopup("Вашето местоположение");
      applyDistances();
      var nearest = points[0];
      map.setView(userPos, 14);
      focusPoint(nearest);
      nearBtn.disabled=false; nearBtn.innerHTML="Най-близкият до мен";
    }, function(){
      alert("Не успяхме да вземем местоположението. Разреши достъпа в браузъра.");
      nearBtn.disabled=false; nearBtn.innerHTML="Най-близкият до мен";
    }, {enableHighAccuracy:true, timeout:10000});
  });

  fetch(DATA, {cache:"no-cache"})
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(geo){
      var bounds = [];
      geo.features.forEach(function(f){
        var c = f.geometry.coordinates, pr = f.properties;
        var p = {name:pr.name, city:pr.city||"", address:pr.address||"",
                 access:pr.access||"", hours:pr.hours||"", lat:c[1], lng:c[0]};
        p.marker = L.marker([p.lat,p.lng], {icon:ICON, title:p.name})
          .addTo(map).bindPopup(popupHtml(p), {autoPan:false});
        p.marker.on("click", function(){ points.forEach(function(q){ q.li && q.li.classList.toggle("active", q===p); }); });
        points.push(p); bounds.push([p.lat,p.lng]);
      });
      render();
      if(bounds.length) map.fitBounds(bounds, {padding:[40,40], maxZoom:15});
      if(window.__hideSplash) window.__hideSplash();
      // Shortcut / deep link: ?near=1 immediately finds the nearest AED
      try{ if(new URLSearchParams(location.search).get("near")==="1") nearBtn.click(); }catch(_){}
    })
    .catch(function(e){
      listEl.innerHTML = '<li class="card">Данните не се заредиха ('+esc(String(e.message))+'). Презареди страницата.</li>';
      if(window.__hideSplash) window.__hideSplash();
    });
})();
</script>

<script>
(function(){
  "use strict";
  // Register the service worker (offline shell + map data + tiles)
  if("serviceWorker" in navigator){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("/sw.js").catch(function(){});
    });
  }

  var btn = document.getElementById("installBtn");
  var standalone = window.matchMedia("(display-mode: standalone)").matches || navigator.standalone === true;
  var deferred = null;

  // Android / desktop Chromium: custom 1-tap install
  window.addEventListener("beforeinstallprompt", function(e){
    e.preventDefault(); deferred = e;
    if(btn) btn.style.display = "inline-flex";
  });
  if(btn) btn.addEventListener("click", function(){
    if(!deferred) return;
    deferred.prompt();
    deferred.userChoice.finally(function(){ deferred = null; btn.style.display = "none"; });
  });
  window.addEventListener("appinstalled", function(){ if(btn) btn.style.display = "none"; });

  // iOS has no install event — show a one-time "Add to Home Screen" hint
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  if(isIOS && !standalone){
    try{
      if(!localStorage.getItem("aed_ios_hint")){
        var hint = document.getElementById("iosHint");
        if(hint) hint.style.display = "flex";
      }
    }catch(_){}
  }
  var hc = document.getElementById("iosHintClose");
  if(hc) hc.addEventListener("click", function(){
    var hint = document.getElementById("iosHint");
    if(hint) hint.style.display = "none";
    try{ localStorage.setItem("aed_ios_hint","1"); }catch(_){}
  });
})();
</script>
</body>
